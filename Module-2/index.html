<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Module-2</title>
    <link  rel="stylesheet" href="style.css">
</head>
<body>
    <Header>
        <h1 id="page-title">This is a Product Card</h1>
    </Header>
    <Main class="container">
        <section class="card">
            <img class="image" id="coffe" src="assets/img.svg" alt="This is a coffe card">
            <div class="product-info">
            <h3 class="product-title">قهوة سريعة الذوبان الريحان – 195غ</h3>
            <p class="desc">نكهة غنية كاملة مع كل كوب قهوة محضر من حبوب القهوة الفاخرة متوسطة التحميص وتستمتع برائحة قهوة سريعة التحضير الغنية، وتتلذذ بطعم النشاط والابداع.</p>
            <p class="price">3.50 JD</p>
            </div>
        </section>
    </Main>
</body>
</html>
